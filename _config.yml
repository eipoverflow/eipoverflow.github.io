# ============================================================
#  SITE CONFIG — edit these, then just write markdown posts.
# ============================================================
title: eipoverflow
description: security research · exploits · teaching
url: "https://eipoverflow.github.io"

# the shell prompt shown across the site: user@host:~$
shell:
  user: eipoverflow
  host: exo

# pretty post URLs, e.g. /research/2025/heap-grooming/
permalink: /:categories/:year/:title/

# default front matter so posts only need title + category
defaults:
  - scope: { path: "", type: "posts" }
    values: { layout: "post" }

# show drafts locally with `--drafts`; ignore build files
exclude: [Gemfile, Gemfile.lock, README.md, vendor]
