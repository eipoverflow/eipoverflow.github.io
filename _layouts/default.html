<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% if page.title %}{{ page.title }} ~ {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="{{ '/assets/css/terminal.css' | relative_url }}" />
</head>
<body>
  <main class="crt">
    <div class="titlebar">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="grow">/dev/tty1 — bash</span>
      <button class="tbtn" id="themeBtn" title="toggle phosphor">[ phosphor ]</button>
      <span class="clock" id="clock">--:--:--</span>
    </div>
    {{ content }}
  </main>

  <script>
  /* shared: clock + phosphor persistence across all pages */
  (function () {
    try {
      if (localStorage.getItem("phosphor") === "amber")
        document.documentElement.dataset.theme = "amber";
    } catch (e) {}

    function setTheme(t) {
      if (t === "amber") document.documentElement.dataset.theme = "amber";
      else document.documentElement.removeAttribute("data-theme");
      try { localStorage.setItem("phosphor", t); } catch (e) {}
    }
    window.__setTheme = setTheme; /* let the homepage `theme` command reuse this */

    var btn = document.getElementById("themeBtn");
    if (btn) btn.addEventListener("click", function () {
      setTheme(document.documentElement.dataset.theme === "amber" ? "green" : "amber");
    });

    var clock = document.getElementById("clock");
    setInterval(function () {
      clock.textContent = new Date().toTimeString().slice(0, 8);
    }, 1000);
  })();
  </script>
</body>
</html>
